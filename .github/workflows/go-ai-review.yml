name: Go AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: Get PR diff
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > diff.txt

      - name: Create prompt (safe JSON)
        run: |
          DIFF_CONTENT=$(jq -Rs . < diff.txt)

          jq -n \
            --arg diff "$DIFF_CONTENT" \
            '{
              model: "gpt-4.1",
              messages: [
                {
                  role: "system",
                  content: "You are a senior Go engineer. Return STRICT JSON only."
                },
                {
                  role: "user",
                  content: ("Review this Go PR.\n\nDIFF:\n" + $diff + "\n\nReturn JSON with summary and issues.")
                }
              ]
            }' > prompt.json

      - name: Debug prompt (optional but useful)
        run: cat prompt.json

      - name: Call AI
        run: |
          curl -sS -X POST https://models.github.ai/inference \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Content-Type: application/json" \
            -d @prompt.json > response.json

      - name: Debug AI response
        run: cat response.json

      - name: Extract response
        run: |
          jq -r '.choices[0].message.content // "AI response parsing failed"' response.json > review.txt

      - name: Post comment
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file review.txt