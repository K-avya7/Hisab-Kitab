name: AI Review (Basic)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get PR diff
        run: |
          git fetch origin main
          git diff origin/main...HEAD > diff.txt

      - name: Create payload
        run: |
          DIFF=$(cat diff.txt | jq -Rs .)

          jq -n \
            --arg diff "$DIFF" \
            '{
              model: "gpt-5",
              messages: [
                {
                  role: "system",
                  content: "You are a senior Go developer reviewing code."
                },
                {
                  role: "user",
                  content: ("Review this PR diff and give suggestions:\n\n" + $diff)
                }
              ]
            }' > payload.json

      - name: Call model
        run: |
          curl -s https://models.github.ai/inference/chat/completions \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @payload.json > response.json

      - name: Debug response
        run: |
          cat response.json

      - name: Post comment
        run: |
          COMMENT=$(jq -r '.choices[0].message.content // "No response"' response.json)

          gh pr comment ${{ github.event.pull_request.number }} \
            --body "$COMMENT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}