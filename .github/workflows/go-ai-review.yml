name: AI Review (Basic)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get PR diff via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} \
            -H "Accept: application/vnd.github.v3.diff" > diff.txt

      - name: Create payload
        run: |
          DIFF=$(jq -Rs . diff.txt)

          jq -n \
            --arg diff "$DIFF" \
            '{
              model: "gpt-5",
              messages: [
                {
                  role: "system",
                  content: "You are a senior Go developer reviewing code."
                },
                {
                  role: "user",
                  content: ("Review this PR diff and provide clear suggestions:\n\n" + $diff)
                }
              ]
            }' > payload.json

      - name: Call model
        run: |
          curl -s https://models.github.ai/inference/chat/completions \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @payload.json > response.json

      - name: Debug response (important for now)
        run: |
          echo "===== MODEL RESPONSE ====="
          cat response.json
          echo "=========================="

      - name: Post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT=$(jq -r '.choices[0].message.content // "No response from model"' response.json)

          gh pr comment ${{ github.event.pull_request.number }} \
            --body "$COMMENT"